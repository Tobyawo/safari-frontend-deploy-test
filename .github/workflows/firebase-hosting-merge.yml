# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies and build
        run: npm install && npm run build
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebaseServiceAccount.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SAFARIWEBSTOREAPP }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          firebase deploy --only hosting --project safariwebstoreapp
